;; ============================================================
;; /etc/asterisk/pjsip_custom.conf  — STAGED TEMPLATE (do NOT apply yet)
;; Fill placeholders after gates G1–G5 + network/VLAN decision.
;; A TLS transport change needs:  asterisk -rx "core restart now"
;; ============================================================

;; ---- transports -------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060            ; internal leg to OXE (default — OmniPCX usually UDP)

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060            ; alt — OXE 172.16.0.5 has TCP/5060 OPEN; switch oxe endpoint to this if vendor uses TCP

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061           ; outbound leg to ElevenLabs
method=tlsv1_2
verify_server=yes
ca_list_file=/etc/ssl/certs/ca-certificates.crt

;; ---- TRUNK 1: OXE (internal, UDP/RTP, G.711 a-law) -------------
;; OXE SIP server = 172.16.0.5 (reachable from middleware 10.0.0.10: ping 0.46ms, TCP5060 open).
;; transport=transport-udp by default; if the vendor sets the trunk to TCP, change to transport-tcp.
[oxe_aor]
type=aor
contact=sip:172.16.0.5:5060
;qualify_frequency=30        ; ENABLE only AFTER the ALE vendor whitelists 10.0.0.10 (else risks OXE auto-block)

[oxe]
type=endpoint
transport=transport-udp
context=from-oxe
disallow=all
allow=alaw,ulaw
aors=oxe_aor
direct_media=no
dtmf_mode=rfc2833
rtp_symmetric=yes
force_rport=yes

[oxe_identify]
type=identify
endpoint=oxe
match=172.16.0.5

;; ---- TRUNK 2: ElevenLabs (outbound, TLS 5061, SRTP) -----------
[elevenlabs_auth]
type=auth
auth_type=userpass
username=<EL_SIP_USERNAME>
password=<EL_SIP_PASSWORD>

[elevenlabs_aor]
type=aor
contact=sip:<EL_NUMBER>@sip.rtc.elevenlabs.io:5061\;transport=tls
qualify_frequency=60
qualify_timeout=3

[elevenlabs]
type=endpoint
transport=transport-tls
context=from-elevenlabs
disallow=all
allow=alaw,ulaw,g722
outbound_auth=elevenlabs_auth
aors=elevenlabs_aor
media_encryption=sdes
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc2833
