# /etc/smartd.conf — STAGED. Set <ALERT_EMAIL> + configure /etc/msmtprc first so mail leaves the box.
# daily short test (02:00) + weekly long test (Sat 03:00); email on failure.
DEVICESCAN -a -o on -S on -s (S/../.././02|L/../../6/03) -m <ALERT_EMAIL> -M exec /usr/share/smartmontools/smartd-runner
