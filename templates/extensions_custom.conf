;; ============================================================
;; /etc/asterisk/extensions_custom.conf — STAGED TEMPLATE (do NOT apply yet)
;; Replace extension numbers (100/200/300/400/0) once gate G7 confirms them.
;; ============================================================

;; ===== INBOUND from OXE (the "press 2" AI route) ==================
[from-oxe]
exten => _X.,1,NoOp(OXE -> AI route)
 same => n,Set(TIMEOUT(absolute)=900)               ; 15-min hard cap
 ; fast fail-over: skip a dead EL trunk instead of waiting full SIP timeout
 same => n,GotoIf($["${DEVICE_STATE(PJSIP/elevenlabs)}"="UNAVAILABLE"]?fb,1)
 same => n,Dial(PJSIP/<EL_NUMBER>@elevenlabs,8)      ; 8s answer window
 same => n,Goto(fb,1)                                ; any failure -> fallback
 same => n,Hangup()

; deterministic fallback -> Reception -> Operator
exten => fb,1,NoOp(ElevenLabs unavailable -> Reception)
 same => n,Playback(pls-hold-while-try)
 same => n,Dial(PJSIP/100@oxe,25)                   ; <RECEPTION_EXT>
 same => n,Dial(PJSIP/0@oxe,25)                     ; <OPERATOR>
 same => n,Hangup()

;; ===== TRANSFER targets requested by the agent (dial-back) =======
;; Asterisk OWNS the transfer (avoids fragile OXE inbound REFER).
[from-elevenlabs]
exten => reception,1,Dial(PJSIP/100@oxe,30)         ; <RECEPTION_EXT>
exten => housekeeping,1,Dial(PJSIP/200@oxe,30)      ; <HK_EXT>
exten => reservations,1,Dial(PJSIP/300@oxe,30)      ; <RESV_EXT>
exten => dutymanager,1,Dial(PJSIP/400@oxe,30)       ; <DUTY_EXT>
exten => operator,1,Dial(PJSIP/0@oxe,30)            ; <OPERATOR>
; guard: no external / premium dialling from the AI context
exten => _X.,1,Hangup()
